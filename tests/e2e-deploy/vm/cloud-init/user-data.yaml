#cloud-config
# Cloud-init configuration for QEMU E2E test VMs.
# Injects an SSH key for the test runner and configures the test user.

users:
  - name: plc
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    # The test runner generates a key pair and replaces this placeholder
    ssh_authorized_keys:
      - __SSH_PUBKEY__

# Disable password auth (key-only)
ssh_pwauth: false

# Minimal packages — cloud images already include openssh-server
packages: []

# Ensure SSH is running
runcmd:
  - systemctl enable ssh || systemctl enable sshd
  - systemctl start ssh || systemctl start sshd
