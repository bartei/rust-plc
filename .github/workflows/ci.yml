name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Format check (disabled for now) ──────────────────────────────────
  # fmt:
  #   name: Format
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #       with:
  #         components: rustfmt
  #     - run: cargo fmt --all -- --check

  # ── Lint ────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - run: cargo build --workspace --all-targets

  # ── Unit & integration tests ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config socat
      # Build st-cli first (needed by LSP integration tests)
      - run: cargo build -p st-cli
      - name: Run all tests
        run: cargo test --workspace --exclude st-comm-modbus --exclude st-comm-serial
      - name: Run serial/Modbus tests (single-threaded — shared socat ports)
        # ST_REQUIRE_SOCAT=1 makes the rtu/serial integration tests panic
        # if socat is missing instead of silently skipping — guards against a
        # future workflow change accidentally dropping the apt package.
        run: cargo test -p st-comm-serial -p st-comm-modbus -- --test-threads=1
        env:
          ST_CLI_BIN: ${{ github.workspace }}/target/debug/st-cli
          ST_REQUIRE_SOCAT: "1"

  # ── Acceptance-only coverage (LCOV + summary) ─────────────────────────
  # Reports coverage from integration tests with proper child-process
  # instrumentation (st-cli serve, st-target-agent), so the LSP server.rs
  # and api/* modules don't appear as 0% just because the binaries the tests
  # spawn weren't built with -Cinstrument-coverage. Driven by
  # `scripts/coverage.sh`, which is the same script developers run locally.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          # Coverage builds use different RUSTFLAGS than the regular CI
          # build — keep their target dirs separated so they don't churn
          # each other's caches.
          shared-key: coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install system dependencies
        # socat is hard-required by ./scripts/coverage.sh — without it,
        # st-comm-modbus / st-comm-serial integration tests would silently
        # skip and ~1.4k lines of comm-stack coverage would drop to 0%.
        # libudev-dev + pkg-config are needed at link time for st-comm-serial.
        # jq is consumed by the optional --fail-under gate.
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config socat jq
      - name: Run coverage
        # The script sources `cargo llvm-cov show-env`, then `cargo build`s
        # the binaries spawned by integration tests (st-cli, st-target-agent)
        # so child-process .profraw files are merged into the final report.
        run: ./scripts/coverage.sh --fail-under 60
      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: |
            target/llvm-cov/lcov.info
            target/llvm-cov/coverage.json
            target/llvm-cov/summary.txt
          retention-days: 14
      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('target/llvm-cov/summary.txt', 'utf8');
            // Trim to last ~60 lines so the comment fits — the per-file rows
            // above the TOTAL are the most useful when reviewing.
            const lines = summary.trim().split('\n');
            const tail = lines.slice(-60).join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Coverage report\n\n```\n' + tail + '\n```'
            });

  # ── Security audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency license & advisory check ─────────────────────────────
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories sources

  # ── VS Code webview unit tests (monitor-tree) ───────────────────────
  vscode-unit:
    name: VS Code Unit (monitor-tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Build extension + webview
        working-directory: editors/vscode
        run: |
          npm ci --ignore-scripts
          npm run compile
          npm run build:webview
      - name: Run monitor-tree unit tests
        working-directory: editors/vscode
        run: node test/monitor-tree.test.js

  # ── VS Code electron extension tests (@vscode/test-electron) ────────
  # Runs every headless-VS-Code suite under Xvfb (plan item 267):
  #   - runTest:       extension activation + monitor panel + debug toolbar
  #                    + LSP hover/goto + multi-file breakpoints + force/unforce
  #   - runUpdateTest: command-palette + status-bar update flow against a
  #                    local st-target-agent process
  vscode-electron:
    name: VS Code Electron
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev pkg-config \
            xvfb xauth \
            libnss3 libasound2t64 libgtk-3-0 libgbm1 \
            libxkbcommon0 libx11-xcb1 libsecret-1-0
      # The extension's debug adapter shells out to `st-cli debug` — the
      # electron tests fail with "Debug session should start" without this.
      # st-target-agent is needed by runUpdateTest (online-update.test.ts
      # spawns it locally and drives the program/update endpoint through
      # the extension's command palette + status bar).
      - name: Build st-cli + st-target-agent
        run: cargo build -p st-cli -p st-target-agent
      - name: Build extension + webview
        working-directory: editors/vscode
        run: |
          npm ci --ignore-scripts
          npm run compile
          npm run build:webview
      - name: Run electron tests under xvfb (extension + LSP + DAP + monitor)
        working-directory: editors/vscode
        run: xvfb-run -a node ./out/test/runTest.js
      - name: Run online-update electron tests under xvfb
        working-directory: editors/vscode
        env:
          ST_E2E_UPDATE: "1"
        run: xvfb-run -a node ./out/test/runUpdateTest.js
      - name: Run non-intrusive attach electron tests under xvfb
        working-directory: editors/vscode
        env:
          ST_E2E_ATTACH: "1"
        run: xvfb-run -a node ./out/test/runAttachTest.js

  # ── Playwright UI tests (monitor panel webview) ─────────────────────
  playwright:
    name: Playwright UI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      # Spec file boots monitor-test-server + a static fixture server;
      # the test harness needs both.
      - name: Build monitor-test-server
        run: cargo build -p st-monitor --bin monitor-test-server
      - name: Build VS Code webview
        working-directory: editors/vscode
        run: |
          npm ci --ignore-scripts
          npm run compile
          npm run build:webview
      - name: Install Playwright + browsers
        working-directory: editors/vscode/test/ui
        run: |
          npm init -y > /dev/null
          npm install --no-save @playwright/test@1.52.0
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: editors/vscode/test/ui
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: editors/vscode/test/ui/playwright-report
          retention-days: 7

  # ── E2E tests (QEMU x86_64) ─────────────────────────────────────────
  e2e-x86_64:
    name: E2E (x86_64)
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install QEMU and tools
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 genisoimage

      - name: Build static agent + CLI (x86_64 musl)
        run: |
          nix-shell -p pkgsCross.musl64.stdenv.cc --run \
            "CC_x86_64_unknown_linux_musl=x86_64-unknown-linux-musl-gcc \
             cargo build -p st-target-agent -p st-cli \
             --target x86_64-unknown-linux-musl --profile release-static"

      - name: Setup VM images
        run: |
          cd tests/e2e-deploy/vm
          ./setup-images.sh x86_64

      - name: Run x86_64 E2E tests
        run: |
          ST_E2E_QEMU=1 cargo test -p st-target-agent --test e2e_qemu \
            -- --test-threads=1
        env:
          ST_E2E_QEMU: "1"

      - name: Upload VM serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vm-serial-x86_64
          path: tests/e2e-deploy/vm/images/serial-x86_64.log

  # ── E2E tests (QEMU aarch64) ──────────────────────────────────────
  e2e-aarch64:
    name: E2E (aarch64)
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install QEMU aarch64 and tools
        run: sudo apt-get update && sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 genisoimage

      - name: Build static agent + CLI (aarch64 musl)
        run: |
          nix-shell -p pkgsCross.aarch64-multiplatform-musl.stdenv.cc --run \
            "CC_aarch64_unknown_linux_musl=aarch64-unknown-linux-musl-gcc \
             CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-unknown-linux-musl-gcc \
             cargo build -p st-target-agent -p st-cli \
             --target aarch64-unknown-linux-musl --profile release-static"

      - name: Setup VM images
        run: |
          cd tests/e2e-deploy/vm
          ./setup-images.sh aarch64
          # Copy UEFI firmware from system package
          for f in /usr/share/qemu-efi-aarch64/QEMU_EFI.fd /usr/share/AAVMF/AAVMF_CODE.fd; do
            if [ -f "$f" ]; then cp "$f" images/QEMU_EFI.fd; break; fi
          done

      - name: Run aarch64 E2E tests
        run: |
          ST_E2E_QEMU=1 ST_E2E_AARCH64=1 cargo test -p st-target-agent --test e2e_qemu \
            e2e_aarch64 -- --test-threads=1 --nocapture
        env:
          ST_E2E_QEMU: "1"
          ST_E2E_AARCH64: "1"

      - name: Upload VM serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vm-serial-aarch64
          path: tests/e2e-deploy/vm/images/serial-aarch64.log

  # ── Documentation build ─────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          tag=$(curl -sI https://github.com/rust-lang/mdBook/releases/latest | grep -i '^location:' | sed 's|.*/tag/||;s/\r//')
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build docs
        run: cd docs && mdbook build
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book
        if: github.ref == 'refs/heads/master'
