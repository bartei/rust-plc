name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Gate: all CI checks must pass first ─────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Release PR (via release-plz) ───────────────────────────────────
  # release-plz analyzes commits since last release, determines the
  # semver bump (patch/minor/major based on conventional commits),
  # updates Cargo.toml versions, generates CHANGELOG.md, and creates
  # a release PR. When merged, it creates a GitHub release + git tag.
  release-plz:
    name: Release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        run: cargo install release-plz --locked

      - name: Run release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: release-plz release-pr

  # ── Publish release when release PR is merged ───────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [ci]
    # Only run when a release PR commit is pushed (contains version bump)
    if: contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        run: cargo install release-plz --locked

      - name: Create GitHub release & tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: release-plz release

      # ── Build release binaries ──────────────────────────────────────
      - name: Build release binary
        run: cargo build -p st-cli --release

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/st-cli
