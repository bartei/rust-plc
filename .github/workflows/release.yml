name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Gate: run tests + security before releasing ─────────────────────
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p st-cli
      - name: Run all tests
        run: cargo test --workspace
        env:
          ST_CLI_BIN: ${{ github.workspace }}/target/debug/st-cli

  # ── Release PR (via release-plz) ───────────────────────────────────
  release-plz:
    name: Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        run: cargo install release-plz --locked

      - name: Run release-plz
        run: release-plz release-pr --git-token ${{ secrets.GITHUB_TOKEN }}

  # ── Publish release when release PR is merged ───────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [test]
    # Only run when a release PR commit is pushed (contains version bump)
    if: contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install release-plz
        run: cargo install release-plz --locked

      - name: Create GitHub release & tag
        run: release-plz release --git-token ${{ secrets.GITHUB_TOKEN }}

      # ── Build release binaries ──────────────────────────────────────
      - name: Build release binary
        run: cargo build -p st-cli --release

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/st-cli
