# cargo-deny v2 configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check all crates for known vulnerabilities.
# Ignored advisories are from async-opcua transitive deps with no fix available.
ignore = [
    "RUSTSEC-2023-0071", # rsa: Marvin Attack — no patch available, used only for OPC-UA TLS
    "RUSTSEC-2023-0089", # atomic-polyfill: unmaintained — pulled by heapless via async-opcua
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "GPL-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
