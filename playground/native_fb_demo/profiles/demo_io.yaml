name: DemoIo
vendor: Demo
protocol: simulated
description: "Simple demo I/O module with 4 DI, 2 DO, 1 AI, 1 AO"
fields:
  - name: DI_0
    type: BOOL
    direction: input
    register: { address: 0, kind: virtual }
  - name: DI_1
    type: BOOL
    direction: input
    register: { address: 1, kind: virtual }
  - name: DI_2
    type: BOOL
    direction: input
    register: { address: 2, kind: virtual }
  - name: DI_3
    type: BOOL
    direction: input
    register: { address: 3, kind: virtual }
  - name: AI_0
    type: INT
    direction: input
    register: { address: 10, kind: virtual }
  - name: DO_0
    type: BOOL
    direction: output
    register: { address: 20, kind: virtual }
  - name: DO_1
    type: BOOL
    direction: output
    register: { address: 21, kind: virtual }
  - name: AO_0
    type: INT
    direction: output
    register: { address: 30, kind: virtual }
