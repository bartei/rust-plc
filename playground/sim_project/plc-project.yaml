# yaml-language-server: $schema=../../schemas/plc-project.schema.json
name: SimulatedIO
version: "1.0.0"
entryPoint: Main

# Scan cycle engine settings.
# `cycle_time` is the target period for one full scan cycle.
# The engine sleeps the remainder so the loop runs at a stable rate.
# Omit to run as fast as the CPU allows.
# Accepted units: ns, us / µs, ms, s. A bare number is treated as ms.
engine:
  cycle_time: 10ms
