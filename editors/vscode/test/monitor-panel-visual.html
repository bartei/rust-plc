<!DOCTYPE html>
<!--
  Visual test fixture for the PLC Monitor panel's tree view.

  Open this file in a browser to verify:
  1. The tree renders correctly with expand/collapse
  2. Nested FBs (counter, edge) appear as separate collapsible groups
  3. Scalar fields show values inline
  4. The tree rebuilds when new variable data arrives

  This file simulates the exact same JS logic as monitorPanel.ts's webview,
  fed with mock telemetry data matching the multi_file_project playground.
-->
<html>
<head>
  <title>PLC Monitor Panel — Visual Test</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #ccc;
      background: #1e1e1e;
      padding: 10px;
      font-size: 13px;
    }
    h2 {
      margin-top: 0;
      border-bottom: 1px solid #444;
      padding-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #333; }
    th { background: #264f78; font-weight: bold; }
    .value { font-family: 'Consolas', monospace; font-weight: bold; }
    .type { color: #888; font-style: italic; }
    .tree-toggle { cursor: pointer; font-size: 11px; user-select: none; display: inline-block; width: 12px; }
    .tree-child td.name { padding-left: 28px; }
    .forced td.value { color: #d18616; font-weight: bold; }
    .forced td.name::before { content: "\1F512 "; color: #d18616; }
    .empty-msg { text-align: center; color: #888; padding: 12px; }
    .pending { color: #888; }
    button {
      padding: 2px 8px; cursor: pointer;
      background: #0e639c; color: white; border: none; border-radius: 2px; font-size: 12px;
    }
    button:hover { background: #1177bb; }
    button.secondary { background: #333; color: #ccc; }
    .controls { margin-bottom: 10px; display: flex; gap: 8px; }
    .controls button { padding: 4px 12px; }
    .log { background: #111; padding: 8px; font-family: monospace; font-size: 11px; max-height: 150px; overflow: auto; border: 1px solid #333; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>PLC Monitor Panel — Visual Test Fixture</h2>

  <div class="controls">
    <button data-testid="btn-watch-filler" onclick="simulateAddWatch('Main.filler')">Watch Main.filler</button>
    <button data-testid="btn-watch-counter" onclick="simulateAddWatch('Main.filler.counter')">Watch Main.filler.counter</button>
    <button data-testid="btn-watch-cycle" onclick="simulateAddWatch('Main.cycle')">Watch Main.cycle</button>
    <button data-testid="btn-watch-cv" onclick="simulateAddWatch('Main.filler.counter.CV')">Watch counter.CV</button>
    <button data-testid="btn-tick" onclick="simulateTelemetry()">Simulate Telemetry Tick</button>
    <button data-testid="btn-clear" onclick="clearAll()">Clear All</button>
    <button data-testid="btn-restore-expanded" onclick="restoreExpandedState()">Restore Expanded</button>
    <button data-testid="btn-watch-with-children" onclick="simulateAddWatchWithChildren()">Watch filler (children)</button>
    <button data-testid="btn-reset-session" onclick="simulateResetSession()">Reset Session</button>
    <button data-testid="btn-empty-tick" onclick="simulateEmptyTelemetryTick()">Empty Tick</button>
  </div>

  <h2>Watch List</h2>
  <table>
    <thead><tr><th>Name</th><th>Value</th><th>Type</th><th>Actions</th></tr></thead>
    <tbody id="var-body">
      <tr><td colspan="4" class="empty-msg">Watch list is empty. Click a button above to add variables.</td></tr>
    </tbody>
  </table>

  <div class="log" id="log">Test log:<br></div>

  <script>
    // ========================================================================
    // Mock data matching the multi_file_project playground
    // ========================================================================
    let cycle = 0;
    function mockTelemetryData() {
      cycle++;
      return [
        { name: "Main.filler.start", value: cycle % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.target_fill", value: "5", type: "INT" },
        { name: "Main.filler.valve_open", value: cycle > 5 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.fill_done", value: "FALSE", type: "BOOL" },
        { name: "Main.filler.fill_count", value: String(Math.floor(cycle / 2) % 6), type: "INT" },
        { name: "Main.filler.filling", value: cycle > 5 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.pulse_toggle", value: cycle % 2 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.counter.CU", value: cycle % 2 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.counter.RESET", value: "FALSE", type: "BOOL" },
        { name: "Main.filler.counter.PV", value: "5", type: "INT" },
        { name: "Main.filler.counter.Q", value: Math.floor(cycle / 2) >= 5 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.counter.CV", value: String(Math.floor(cycle / 2) % 6), type: "INT" },
        { name: "Main.filler.counter.prev_cu", value: (cycle - 1) % 2 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.edge.CLK", value: cycle % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.edge.Q", value: cycle === 1 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.filler.edge.prev", value: (cycle - 1) % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
        { name: "Main.cycle", value: String(cycle), type: "INT" },
        { name: "Main.bottle_sensor", value: cycle % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
      ];
    }

    // ========================================================================
    // Panel state (same structure as the real monitorPanel.ts)
    // ========================================================================
    let watchList = [];
    let valueMap = new Map();
    let expandedNodes = new Set();
    let childrenMap = new Map();
    /** Simulated persistence store (mirrors workspaceState). */
    let persistedExpanded = [];

    function log(msg) {
      const el = document.getElementById("log");
      el.innerHTML += msg + "<br>";
      el.scrollTop = el.scrollHeight;
    }

    // ========================================================================
    // Tree builder (copied from monitorPanel.ts)
    // ========================================================================
    function buildSubTree(prefix) {
      // If pre-built children from telemetry exist, use them directly.
      const lc = prefix.toLowerCase();
      const prebuilt = childrenMap.get(lc);
      if (prebuilt && prebuilt.length > 0) {
        return childrenToTree(prebuilt);
      }
      // Fallback: reconstruct from flat dotted-path entries in valueMap.
      const prefixLc = lc + ".";
      const tree = {};
      valueMap.forEach((v, fullLc) => {
        if (!fullLc.startsWith(prefixLc)) return;
        const relative = v.name.substring(prefix.length + 1);
        const parts = relative.split(".");
        let node = tree;
        for (let i = 0; i < parts.length - 1; i++) {
          const seg = parts[i];
          if (!node[seg]) node[seg] = { __children: {} };
          node = node[seg].__children;
        }
        const leaf = parts[parts.length - 1];
        node[leaf] = { __value: v, __children: node[leaf] ? node[leaf].__children : null };
      });
      return tree;
    }

    /** Convert a DAP children array into the tree format used by renderTree. */
    function childrenToTree(children) {
      const tree = {};
      for (const child of children) {
        const entry = { __value: null, __children: null };
        if (child.value !== undefined || child.type !== undefined) {
          entry.__value = {
            name: child.name,
            value: child.value || "",
            type: child.type || "",
            forced: !!child.forced
          };
        }
        if (child.children && child.children.length > 0) {
          entry.__children = childrenToTree(child.children);
        }
        tree[child.name] = entry;
      }
      return tree;
    }

    function renderTree(tree, parentPath, depth) {
      let html = "";
      const indent = "\u00a0\u00a0\u00a0\u00a0".repeat(depth);
      const sortedKeys = Object.keys(tree).sort();
      for (const key of sortedKeys) {
        const entry = tree[key];
        const fullPath = parentPath + "." + key;
        const fullLc = fullPath.toLowerCase();
        const hasChildren = entry.__children && Object.keys(entry.__children).length > 0;
        const isExpanded = expandedNodes.has(fullLc);
        const v = entry.__value;

        if (hasChildren) {
          const toggle = '<span class="tree-toggle" onclick="toggleNode(\'' +
            fullPath.replace(/'/g, "\\'") + '\')">' +
            (isExpanded ? '\u25BE' : '\u25B8') + '</span> ';
          const value = v ? v.value : '';
          const type = v ? v.type : '';
          html += '<tr data-var="' + fullLc + '">' +
            '<td class="name">' + indent + toggle + key + '</td>' +
            '<td class="value">' + value + '</td>' +
            '<td class="type"><i>' + type + '</i></td>' +
            '<td></td></tr>';
          if (isExpanded) {
            html += renderTree(entry.__children, fullPath, depth + 1);
          }
        } else if (v) {
          const isForced = !!v.forced;
          html += '<tr data-var="' + fullLc + '"' + (isForced ? ' class="forced"' : '') + '>' +
            '<td class="name">' + indent + '\u00a0\u00a0 ' + key + '</td>' +
            '<td class="value">' + v.value + '</td>' +
            '<td class="type"><i>' + v.type + '</i></td>' +
            '<td></td></tr>';
        }
      }
      return html;
    }

    function renderWatchTable() {
      const tbody = document.getElementById("var-body");
      if (watchList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">Watch list is empty. Click a button above.</td></tr>';
        return;
      }
      let html = "";
      for (const name of watchList) {
        const lc = name.toLowerCase();
        const v = valueMap.get(lc);
        const safeName = name.replace(/'/g, "\\'");

        const tree = buildSubTree(name);
        const hasChildren = Object.keys(tree).length > 0;
        const isExpanded = expandedNodes.has(lc);

        if (hasChildren) {
          const toggle = '<span class="tree-toggle" onclick="toggleNode(\'' +
            safeName + '\')">' + (isExpanded ? '\u25BE' : '\u25B8') + '</span> ';
          const value = v ? v.value : '';
          const type = v ? v.type : '';
          html += '<tr data-var="' + lc + '">' +
            '<td class="name">' + toggle + name + '</td>' +
            '<td class="value">' + value + '</td>' +
            '<td class="type"><i>' + type + '</i></td>' +
            '<td><button class="secondary" onclick="removeWatch(\'' + safeName + '\')">Remove</button></td></tr>';
          if (isExpanded) {
            html += renderTree(tree, name, 1);
          }
        } else {
          const value = v ? v.value : '<span class="pending">\u2026</span>';
          const type = (v && v.type) || '';
          html += '<tr data-var="' + lc + '">' +
            '<td class="name">' + name + '</td>' +
            '<td class="value">' + value + '</td>' +
            '<td class="type"><i>' + type + '</i></td>' +
            '<td><button class="secondary" onclick="removeWatch(\'' + safeName + '\')">Remove</button></td></tr>';
        }
      }
      tbody.innerHTML = html;
    }

    function toggleNode(name) {
      const lc = name.toLowerCase();
      if (expandedNodes.has(lc)) {
        expandedNodes.delete(lc);
      } else {
        expandedNodes.add(lc);
      }
      log("Toggle: " + name + " → " + (expandedNodes.has(lc) ? "expanded" : "collapsed"));
      // Persist expand state (simulates VS Code workspaceState).
      persistedExpanded = Array.from(expandedNodes);
      renderWatchTable();
    }

    function updateValueCells() {
      const tbody = document.getElementById("var-body");
      const rows = tbody.children;
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const lc = row.getAttribute && row.getAttribute("data-var");
        if (!lc) continue;
        const v = valueMap.get(lc);
        if (!v) continue;
        const valueCell = row.querySelector(".value");
        if (valueCell && valueCell.textContent !== v.value) {
          valueCell.textContent = v.value;
        }
      }
    }

    // ========================================================================
    // Simulation controls
    // ========================================================================
    function simulateAddWatch(name) {
      if (!watchList.some(v => v.toLowerCase() === name.toLowerCase())) {
        watchList.push(name);
        log("addWatch: " + name);
      }
      // Simulate immediate telemetry push (same as DAP does)
      injectTelemetry();
    }

    function simulateTelemetry() {
      injectTelemetry();
    }

    function injectTelemetry() {
      const data = mockTelemetryData();
      const prevSize = valueMap.size;
      // Filter to only variables matching watched prefixes (same as DAP does)
      for (const v of data) {
        const matches = watchList.some(w =>
          v.name.toLowerCase() === w.toLowerCase() ||
          v.name.toLowerCase().startsWith(w.toLowerCase() + ".")
        );
        if (matches) {
          valueMap.set(v.name.toLowerCase(), v);
          // Store pre-built children tree from telemetry.
          if (v.children && Array.isArray(v.children)) {
            childrenMap.set(v.name.toLowerCase(), v.children);
          }
        }
      }
      log("Telemetry tick " + cycle + ": " + valueMap.size + " vars in valueMap (was " + prevSize + ")");
      if (valueMap.size !== prevSize) {
        renderWatchTable();
      } else {
        updateValueCells();
      }
    }

    /** Simulate a new debug session starting (clears stale values).
     *  Mirrors the resetSession message sent by the extension host
     *  when a new plc/varCatalog event arrives. */
    function simulateResetSession() {
      valueMap.clear();
      childrenMap.clear();
      cycle = 0;
      log("Session reset — valueMap and childrenMap cleared");
      renderWatchTable();
    }

    /** Simulate a telemetry tick with empty variables (DAP running but
     *  watch list not synced yet — this is what happens when the second
     *  session starts and the watchVariables command hasn't arrived). */
    function simulateEmptyTelemetryTick() {
      cycle++;
      log("Empty telemetry tick " + cycle + " (no variables — watch list not synced)");
      // Cycle stats update but no variables — same as the real bug
    }

    /** Simulate restoring expanded state from persistence (like panel reload). */
    function restoreExpandedState() {
      expandedNodes = new Set(persistedExpanded);
      log("Restored expanded nodes: " + JSON.stringify(persistedExpanded));
      renderWatchTable();
    }

    function removeWatch(name) {
      watchList = watchList.filter(v => v.toLowerCase() !== name.toLowerCase());
      // Remove all values under this prefix
      const lc = name.toLowerCase();
      const prefix = lc + ".";
      const toDelete = [];
      valueMap.forEach((_, k) => {
        if (k === lc || k.startsWith(prefix)) toDelete.push(k);
      });
      toDelete.forEach(k => valueMap.delete(k));
      log("removeWatch: " + name);
      renderWatchTable();
    }

    function clearAll() {
      watchList = [];
      valueMap.clear();
      childrenMap.clear();
      expandedNodes.clear();
      persistedExpanded = [];
      cycle = 0;
      log("Cleared all");
      renderWatchTable();
    }

    /** Simulate watching Main.filler with pre-built children (DAP tree format). */
    function simulateAddWatchWithChildren() {
      const name = "Main.filler";
      if (!watchList.some(v => v.toLowerCase() === name.toLowerCase())) {
        watchList.push(name);
        log("addWatch (with children): " + name);
      }
      cycle++;
      // Inject a tree-structured telemetry entry (as the DAP now sends).
      const treeEntry = {
        name: "Main.filler",
        value: "",
        type: "FillController",
        children: [
          { name: "start", value: cycle % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
          { name: "target_fill", value: "5", type: "INT" },
          { name: "valve_open", value: cycle > 5 ? "TRUE" : "FALSE", type: "BOOL" },
          { name: "fill_done", value: "FALSE", type: "BOOL" },
          { name: "fill_count", value: String(Math.floor(cycle / 2) % 6), type: "INT" },
          { name: "filling", value: cycle > 5 ? "TRUE" : "FALSE", type: "BOOL" },
          { name: "pulse_toggle", value: cycle % 2 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
          { name: "counter", children: [
            { name: "CU", value: cycle % 2 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
            { name: "RESET", value: "FALSE", type: "BOOL" },
            { name: "PV", value: "5", type: "INT" },
            { name: "Q", value: Math.floor(cycle / 2) >= 5 ? "TRUE" : "FALSE", type: "BOOL" },
            { name: "CV", value: String(Math.floor(cycle / 2) % 6), type: "INT" },
            { name: "prev_cu", value: (cycle - 1) % 2 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
          ]},
          { name: "edge", children: [
            { name: "CLK", value: cycle % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
            { name: "Q", value: cycle === 1 ? "TRUE" : "FALSE", type: "BOOL" },
            { name: "prev", value: (cycle - 1) % 20 === 0 ? "TRUE" : "FALSE", type: "BOOL" },
          ]},
        ]
      };
      // Store in valueMap + childrenMap (same as the real panel does).
      valueMap.set(treeEntry.name.toLowerCase(), treeEntry);
      childrenMap.set(treeEntry.name.toLowerCase(), treeEntry.children);
      // Also inject flat descendants for compatibility.
      const flatData = mockTelemetryData();
      for (const v of flatData) {
        if (v.name.toLowerCase().startsWith("main.filler.")) {
          valueMap.set(v.name.toLowerCase(), v);
        }
      }
      renderWatchTable();
    }

    // Initial render
    renderWatchTable();
    log("Visual test fixture ready. Click buttons to simulate panel behavior.");
  </script>
</body>
</html>
