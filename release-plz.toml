[workspace]
# Use conventional commits to determine version bumps
# fix: → patch, feat: → minor, breaking change → major
changelog_update = true
git_tag_enable = true
git_release_enable = true
git_release_draft = false
semver_check = false

# Only release the CLI binary (other crates are internal)
[[package]]
name = "st-cli"
publish = false  # Don't publish to crates.io (binary only)
git_release_enable = true
changelog_include = ["st-cli", "st-grammar", "st-syntax", "st-semantics", "st-ir", "st-compiler", "st-runtime", "st-lsp"]

# Internal crates: bump versions but don't publish
[[package]]
name = "st-grammar"
publish = false

[[package]]
name = "st-syntax"
publish = false

[[package]]
name = "st-semantics"
publish = false

[[package]]
name = "st-ir"
publish = false

[[package]]
name = "st-compiler"
publish = false

[[package]]
name = "st-runtime"
publish = false

[[package]]
name = "st-lsp"
publish = false

[[package]]
name = "st-dap"
publish = false

[[package]]
name = "st-monitor"
publish = false
